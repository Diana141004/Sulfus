services:
  # ==========================================
  # SERVICIUL 1: Backend-ul Clasic (FastAPI)
  # ==========================================
  telecom-api:
    platform: linux/amd64
    build: .
    container_name: ml_fastapi_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ==========================================
  # SERVICIUL 2: Serverul AI (FastMCP)
  # ==========================================
  telecom-mcp:
    platform: linux/amd64
    build: .
    container_name: ml_mcp_server
    command: fastmcp run mcp_server.py --transport sse --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ==========================================
  # SERVICIUL 3: Interfața (OpenWebUI)
  # ==========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui_client
    ports:
      - "3000:8080"
    environment:
      - WEBUI_AUTH=false

    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui-data:
